<body>
  <script>
    // SPA redirect handler — pairs with public/404.html (rafgraph/spa-github-pages)
    // Decodes a redirect like /?/article/5 back into /article/5 before React boots.
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, '',
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>
  <div id="root"></div>
</body>
