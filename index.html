ollTo(0, 0), n(!0) }, []), d.jsxs("div", { className: `prose prose-invert max-w-4xl mx-auto p-4 md:p-6 bg-background text-foreground font-sans transition-opacity duration-700 ${e ? "opacity-100" : "opacity-0"}`, children: ["      ", d.jsxs(Ye, { className: "mb-8 bg-card text-card-foreground border-border shadow-lg", children: [d.jsx(Nt, { children: d.jsx(Et, { className: "text-2xl text-primary !mb-1", children: "What's This All About? (Abstract)" }) }), d.jsxs(We, { className: "space-y-4 text-base text-card-foreground/90", children: [d.jsx("p", { children: "Artificial Neural Networks (ANNs) have a fascinating learning trait called 'spectral bias'. This means they tend to grasp simple, low-frequency patterns (like the main melody of a song) much faster than complex, high-frequency details (like intricate musical runs) during training. This is commonly observed when using standard learning methods like Mean Square Error (MSE) loss." }), d.jsx("p", { children: "Enter Physics Informed Neural Networks (PINNs). These are specialized AIs designed to understand and solve problems governed by physical laws, often expressed as differential equations (DEs). Think of them learning fluid dynamics or how electromagnetic fields behave. Instead of just matching data, PINNs are guided by how well they satisfy these fundamental physical equations." }), d.jsx("p", { children: "The core questions this research tackles are: Do PINNs also exhibit this 'spectral bias'? And if so, how does this bias change depending on the complexity of the physical equations, specifically the order of the DEs involved?" }), d.jsx("p", { children: "Through a series of careful numerical experiments using various sinusoidal functions and equations of different complexities, the study firmly establishes that PINNs do indeed show a strong spectral bias. What's more, this bias appears to become even more pronounced as the order (a measure of complexity) of the differential equations increases." })] })] }), d.js import RPi.GPIO as GPIO
import time
import subprocess

# --- Configuration ---
TRIG_PIN = 23
ECHO_PIN = 24
PC_MAC_ADDRESS = "d8:bb:c1:0f:89:f3"  # Replace with your PC's MAC address
WAKE_INTERFACE = "eth0"              # Network interface on Pi for WoL, usually eth0 or wlan0
DETECTION_DISTANCE_CM = 30           # Trigger if hand is closer than this (in cm)
COOLDOWN_PERIOD_S = 10               # Seconds to wait after sending a WoL packet

# --- GPIO Setup ---
GPIO.setmode(GPIO.BCM)  # Use Broadcom pin numbering
GPIO.setwarnings(False)
GPIO.setup(TRIG_PIN, GPIO.OUT)
GPIO.setup(ECHO_PIN, GPIO.IN)

def measure_distance():
    """Measures distance using the HC-SR04 sensor with corrected timeouts."""
    # Send a 10us pulse to TRIG
    GPIO.output(TRIG_PIN, True)
    time.sleep(0.00001)
    GPIO.output(TRIG_PIN, False)

    timeout_start_time = time.time()

    # --- Loop 1: Wait for the echo pulse to start (ECHO goes HIGH) ---
    while GPIO.input(ECHO_PIN) == 0:
        pulse_start_time = time.time()
        if pulse_start_time - timeout_start_time > 0.1:
            return float('inf')

    # --- Loop 2: Wait for the echo pulse to end (ECHO goes LOW) ---
    while GPIO.input(ECHO_PIN) == 1:
        pulse_end_time = time.time()
        if pulse_end_time - pulse_start_time > 0.1:
            return float('inf')

    pulse_duration = pulse_end_time - pulse_start_time
    distance = (pulse_duration * 34300) / 2
    return distance

def send_magic_packet():
    try:
        print(f"Sending WoL packet to {PC_MAC_ADDRESS} via {WAKE_INTERFACE}...")
        subprocess.run(["sudo", "etherwake", "-i", WAKE_INTERFACE, PC_MAC_ADDRESS], check=True)
        print("WoL packet sent.")
        return True
    except subprocess.CalledProcessError as e:
        print(f"Error sending WoL packet: {e}")
        return False
    except FileNotFoundError:
        print("Error: 'etherwake' command not found.")
        return False

print("Ultrasonic Wake-on-LAN script started.")
