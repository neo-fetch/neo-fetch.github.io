J., & Nomura, T. (2014). Multiphysics simulation.",fullCitation:"E.M. Dede, J. Lee and T. Nomura, (2014). Multiphysics simulation. London: Springer, 2014, https://doi.org/10.1007/978-1-4471-5640-6.",url:"https://doi.org/10.1007/978-1-4471-5640-6"},{id:8,text:"Cybenko, G. (1989). Approximations by superposition of a Sigmoidal function.",fullCitation:"G. Cybenko, “Approximations by superposition of a Sigmoidal function”, Mathematics of Control, Signals and Systems, 2, 1989, pp. 303–314."},{id:9,text:"Hornik, K., Stinchcombe, M., & White, H. (1989). Multilayer feedforward networks are universal approximators.",fullCitation:"K. Hornik, M.Stinchcombe, and H. White, “Multilayer feedforward networks are universal approximators”, Neural Networks, 2, 1989, pp. 359–366."},{id:10,text:"Raissi, M., Perdikaris, P., & Karniadakis, G.E. (2019). Physics-informed neural networks: A deep learning framework for solving forward and inverse problems involving nonlinear partial differential equations.",fullCitation:"M. Raissi, P. Perdikaris, and G.E. Karniadakis, “Physics-informed neural networks: A deep learning framework for solving forward and inverse problems involving nonlinear partial differential equations”, Journal of Computational Physics, 378, 2019, pp. 686-707."},{id:11,text:"Hennigh, O. et al. (2020). NVIDIA SIMNETTM: An AI-Accelerated Multi-Physics Simulation Framework.",fullCitation:"Oliver Hennigh et al, “NVIDIA SIMNETTM: An AI-Accelerated Multi-Physics Simulation Framework”, arXiv preprint arXiv:2012.07938v1, 2020.",url:"https://arxiv.org/abs/2012.07938"},{id:12,text:"Jacot, A., Gabriel, F., & Hongler, C. (2018). Neural tangent kernel: Convergence and generalization in neural networks.",fullCitation:"Arthur Jacot, Franck Gabriel, Clement Hongler, “Neural tangent kernel: Convergence and generalization in neural networks”, Advances in Neural Information Processing Systems, 2018, pp. 8571–8580."},{id:13,text:"Tancik, M. et al. (2020). Fourier features let networks learn high frequency functions in low dimensional domains.",fullCitation:"Matthew Tancik et al, “Fourier features let networks learn high frequency functions in low dimensional domains”, arXiv:2006.10739, also NeurIPS Proceedings, 2020.",url:"https://arxiv.org/abs/2006.10739"},{id:14,text:"Rahaman, N. et al. (2019). On the spectral bias of neural networks.",fullCitation:"Nasim Rahaman et al, “On the spectral bias of neural networks”, International Conference on Machine Learning, 2019, pp. 5301–5310."},{id:15,text:"Lu, L., Meng, X., Mao, Z., & Karniadakis, G.E. (2021). DeepXDE: A Deep Learning Library for Solving Differential Equations.",fullCitation:"Lu Lu, Xuhui Meng, Zhiping Mao and G.E. Karniadakis, “DeepXDE: A Deep Learning Library for Solving Differential Equations”, SIAM review, Vol. 63, 2021, pp. 208-228."},{id:16,text:"Arora, S. et al. (2019). On exact computation with an infinitely wide neural net.",fullCitation:"Sanjeev Arora et al, “On exact computation with an infinitely wide neural net”, Advances in Neural Information Processing Systems, 2019, pp. 8141–8150."},{id:17,text:"Lee, J. et al. (2019). Wide neural networks of any depth evolve as linear models under gradient descent.",fullCitation:"Jaehoon Lee et al, “Wide neural networks of any depth evolve as linear models under gradient descent”, Advances in Neural Information Processing Systems, 2019, pp. 8572–8583."},{id:18,text:"ScienceDirect. Smallest eigenvalue.",fullCitation:"https://www.sciencedirect.com/topics/mathematics/smallest-eigenvalue, Sec. 4.3, para 2; last accessed July 5, 2022.",url:"https://www.sciencedirect.com/topics/mathematics/smallest-eigenvalue"},{id:19,text:"Mazumder, S. (2016). Numerical Methods for Partial Differential Equations: Finite Difference and Finite Volume Methods.",fullCitation:"Sandip Mazumder, Numerical Methods for Partial Differential Equations: Finite Difference and Finite Volume Methods, Chap. 4, ISBN: 978-0128498941, 2016."},{id:20,text:"Nvidia. (2021). Modulus: A Neural Network Based Partial Differential Equation Solver.",fullCitation:"Nvidia, Modulus: A Neural Network Based Partial Differential Equation Solver, Release v21.06, Nov, 2021."},{id:21,text:"Learning high frequency data via the coupled frequency predictor-corrector triangular DNN",fullCitation:"Learning high frequency data via the coupled frequency predictor-corrector triangular DNN https://link.springer.com/article/10.1007/s13160-023-00577-8"}],v5=()=>{const[e,n]=Le.useState(!1);return j.useEffect(()=>{window.scrollTo(0,0),n(!0)},[]),c.jsxs("div",{className:`prose prose-invert max-w-4xl mx-auto p-4 md:p-6 bg-background text-foreground font-sans transition-opacity duration-700 ${e?"opacity-100":"opacity-0"}`,children:["      ",c.jsxs(Ke,{className:"mb-8 bg-card text-card-foreground border-border shadow-lg",children:[c.jsx(Nt,{children:c.jsx(Et,{className:"text-2xl text-primary !mb-1",children:"What's This All About? (Abstract)"})}),c.jsxs(We,{className:"space-y-4 text-base text-card-foreground/90",children:[c.jsx("p",{children:"Artificial Neural Networks (ANNs) have a fascinating learning trait called 'spectral bias'. This means they tend to grasp simple, low-frequency patterns (like the main melody of a song) much faster than complex, high-frequency details (like intricate musical runs) during training. This is commonly observed when using standard learning methods like Mean Square Error (MSE) loss."}),c.jsx("p",{children:"Enter Physics Informed Neural Networks (PINNs). These are specialized AIs designed to understand and solve problems governed by physical laws, often expressed as differential equations (DEs). Think of them learning fluid dynamics or how electromagnetic fields behave. Instead of just matching data, PINNs are guided by how well they satisfy these fundamental physical equations."}),c.jsx("p",{children:"The core questions this research tackles are: Do PINNs also exhibit this 'spectral bias'? And if so, how does this bias change depending on the complexity of the physical equations, specifically the order of the DEs involved?"}),c.jsx("p",{children:"Through a series of careful numerical experiments using various sinusoidal functions and equations of different complexities, the study firmly establishes that PINNs do indeed show a strong spectral bias. What's more, this bias appears to become even more pronounced as the order (a measure of complexity) of the differential equations increases."})]})]}),c.jsxs("section",{className:"mb-8",children:[c.jsx("h2",{className:"text-3xl font-semibold text-primary mb-4 border-b border-border pb-2",children:"Introduction: When AI Meets the Laws of Physics"}),c.jsxs(Ke,{className:"bg-card text-card-foreground border-border shadow-lg p-6 space-y-4",children:[c.jsx("p",{children:"Many phenomena in our universe, from the grand scale of weather systems to the microscopic behavior of particles, are described by sets of mathematical rules known as Partial Differential Equations (PDEs). These equations are fundamental to understanding how various systems evolve and interact."}),c.jsx("p",{children:"Solving these PDEs for complex, real-world scenarios has traditionally relied on intensive numerical simulations. However, a new approach leveraging the power of Artificial Intelligence, specifically PINNs, has gained significant traction. PINNs have shown particular promise for applications requiring rapid solutions, especially when designs or conditions undergo minor changes."}),c.jsx("p",{children:"Given that PINNs are a type of neural network, it's logical to investigate whether they inherit common characteristics of ANNs, such as spectral bias. This bias, where networks preferentially learn simpler (low-frequency) patterns first, is a known aspect of standard ANNs, often explained by Neural Tangent Kernel (NTK) theory. But PINNs are unique: their learning process is driven by minimizing the residuals of the physical equations themselves, rather than solely relying on supervised data matching. This difference makes the presence and nature of spectral bias in PINNs an intriguing area of research."})]})]}),c.jsxs("section",{className:"mb-8",children:[c.jsx("h2",{className:"text-3xl font-semibold text-primary mb-4 border-b border-border pb-2",children:"Decoding Key Concepts"}),c.jsxs(Sa,{type:"single",collapsible:!0,className:"w-full space-y-4",children:[c.jsxs(gt,{value:"item-1",className:"border border-border rounded-md bg-card shadow-md",children:[c.jsx(yt,{className:"text-xl hover:no-underline text-left px-6 py-4  font-medium",children:"What are Physics Informed Neural Networks (PINNs)?"}),c.jsxs(xt,{className:"px-6 pb-6 pt-2 text-base text-card-foreground/80 space-y-3",children:[c.jsx("p",{children:"Imagine teaching a student physics. Instead of just having them memorize answers to problems (like a traditional AI might learn by matching data points), a PINN attempts to understand the underlying physical principles – the differential equations that govern the system."}),c.jsx("p",{children:'A PINN is a neural network that typically takes inputs like spatial coordinates (x, y, z) and time (t). Its job is to predict the values of physical quantities at those input points, such as velocity, pressure, or temperature. The "physics-informed" part comes from how it learns:'}),c.jsxs("ul",{className:"list-disc pl-6 space-y-2 marker:text-primary",children:[c.jsx("li",{children:"It uses a technique called 'automatic differentiation' to calculate derivatives from the network's output. These derivatives are then plugged into the governing physical equations."}),c.jsx("li",{children:`The network's error (or 'loss') is calculated based on how well its predictions satisfy these equations (the "residuals" of the equations).`}),c.jsx("li",{children:"It also incorporates boundary conditions (e.g., the temperature at a specific edge) and initial conditions into its loss function."})]}),c.jsx("p",{children:"By trying to minimize this physics-based loss, the network learns a solution that is consistent with the known physical laws."}),c.jsx(Nf,{src:"https://raw.githubusercontent.com/neo-fetch/mcbk/refs/heads/master/Researchfig1.png",alt:"Conceptual Diagram of PINN Training Process",caption:"A simplified view of how a PINN learns by minimizing equation residuals and satisfying boundary/initial conditions. (Assumes image similar to Fig. 1 in the paper)"})]})]}),c.jsxs(gt,{value:"item-2",className:"border border-border rounded-md bg-card shadow-md",children:[c.jsx(yt,{className:"text-xl hover:no-underline text-left px-6 py-4  font-medium",children:"What is Spectral Bias?"}),c.jsxs(xt,{className:"px-6 pb-6 pt-2 text-base text-card-foreground/80 space-y-3",children:[c.jsx("p",{children:"Spectral bias describes a common characteristic of neural networks: they tend to learn simple, smooth, low-frequency functions or components of a function much faster and more effectively than complex, rapidly changing, high-frequency components."}),c.jsx("p",{children:"Think of it like painting a picture. An artist might first block out the large shapes and general colors (low-frequency information) before adding fine details and textures (high-frequency information). Neural networks often exhibit a similar learning progression."}),c.jsx("p",{children:"This isn't just an arbitrary behavior. For standard ANNs trained with Mean Square Error (MSE) loss and using gradient descent with small learning rates, Neural Tangent Kernel (NTK) theory provides a mathematical framework to understand this. It suggests that the network learns components corresponding to larger eigenvalues of the NTK (often associated with lower frequencies) more rapidly."}),c.jsx(Nf,{src:"https://media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs13160-023-00577-8/MediaObjects/13160_2023_577_Fig3_HTML.png",alt:"Conceptual Graph of Spectral Bias",caption:"Illustrative: Networks tend to fit low-frequency components (smooth curves) before high-frequency details (wiggles). im import RPi.GPIO as GPIO
import time
import subprocess

# --- Configuration ---
TRIG_PIN = 23
ECHO_PIN = 24
PC_MAC_ADDRESS = "d8:bb:c1:0f:89:f3"  # Replace with your PC's MAC address
WAKE_INTERFACE = "eth0"              # Network interface on Pi for WoL, usually eth0 or wlan0
DETECTION_DISTANCE_CM = 30           # Trigger if hand is closer than this (in cm)
COOLDOWN_PERIOD_S = 10               # Seconds to wait after sending a WoL packet

# --- GPIO Setup ---
GPIO.setmode(GPIO.BCM)  # Use Broadcom pin numbering
GPIO.setwarnings(False)
GPIO.setup(TRIG_PIN, GPIO.OUT)
GPIO.setup(ECHO_PIN, GPIO.IN)

def measure_distance():
    """Measures distance using the HC-SR04 sensor with corrected timeouts."""
    # Send a 10us pulse to TRIG
    GPIO.output(TRIG_PIN, True)
    time.sleep(0.00001)
    GPIO.output(TRIG_PIN, False)

    timeout_start_time = time.time()

    # --- Loop 1: Wait for the echo pulse to start (ECHO goes HIGH) ---
    while GPIO.input(ECHO_PIN) == 0:
        pulse_start_time = time.time()
        if pulse_start_time - timeout_start_time > 0.1:
            return float('inf')

    # --- Loop 2: Wait for the echo pulse to end (ECHO goes LOW) ---
    while GPIO.input(ECHO_PIN) == 1:
        pulse_end_time = time.time()
        if pulse_end_time - pulse_start_time > 0.1:
            return float('inf')

    pulse_duration = pulse_end_time - pulse_start_time
    distance = (pulse_duration * 34300) / 2
    return distance

def send_magic_packet():
    try:
        print(f"Sending WoL packet to {PC_MAC_ADDRESS} via {WAKE_INTERFACE}...")
        subprocess.run(["sudo", "etherwake", "-i", WAKE_INTERFACE, PC_MAC_ADDRESS], check=True)
        print("WoL packet sent.")
        return True
    except subprocess.CalledProcessError as e:
        print(f"Error sending WoL packet: {e}")
        return False
    except FileNotFoundError:
        print("Error: 'etherwake' command not found.")
        return False

print("Ultrasonic Wake-on-LAN script started.")
print(f"Monitoring for objects closer than {DETECTION_DISTANCE_CM} cm.")

try:
    last_wake_time = 0
    while True:
        dist = measure_distance()
        print(f"Measured Distance = {dist:.1f} cm")
        if dist < DETECTION_DISTANCE_CM:
            current_time = time.time()
            if (current_time - last_wake_time) > COOLDOWN_PERIOD_S:
                print("Object detected close!")
                if send_magic_packet():
                    last_wake_time = current_time
                    print(f"Cooldown active. Waiting {COOLDOWN_PERIOD_S} seconds.")
            else:
                print("Object detected, but in cooldown period.")
        time.sleep(0.5)
except KeyboardInterrupt:
    print("Measurement stopped by User")
finally:

    --secondary: oklch(0.88 0.04 75);
    --secondary-foreground: oklch(0.25 0.05 35);
    --muted: oklch(0.90 0.03 75);
    --muted-foreground: oklch(0.45 0.04 40);
    --accent: oklch(0.65 0.13 55);
    --accent-foreground: oklch(0.20 0.05 35);
    --border: oklch(0.85 0.04 60);
    --input: oklch(0.85 0.04 60);
    --ring: oklch(0.65 0.13 55);
  }
  body.article-warm.dark,
  .dark body.article-warm {
    --background: oklch(0.16 0.025 35);
    --foreground: oklch(0.94 0.04 80);
    --card: oklch(0.22 0.035 35);
    --card-foreground: oklch(0.94 0.04 80);
    --popover: oklch(0.20 0.04 35);
    --popover-foreground: oklch(0.94 0.04 80);
    --primary: oklch(0.75 0.14 65);
    --primary-foreground: oklch(0.18 0.04 35);
    --secondary: oklch(0.28 0.04 35);
    --secondary-foreground: oklch(0.94 0.04 80);
    --muted: oklch(0.25 0.04 35);
    --muted-foreground: oklch(0.70 0.04 65);
    --accent: oklch(0.65 0.18 45);
    --accent-foreground: oklch(0.97 0.02 80);
    --border: oklch(0.32 0.05 38);
    --input: oklch(0.32 0.05 38);
    --ring: oklch(0.65 0.14 55);
  }

  /* Body text shifts to a warm serif for this article's prose. Headings stay site-default. */
  .article-warm-prose p,
  .article-warm-prose li,
  .article-warm-prose blockquote {
    font-family: ui-serif, "Source Serif Pro", Georgia, Cambria, "Times New Roman", Times, serif;
    font-feature-settings: "liga", "kern";
  }

  /* Section base — gradient cards, each with seasonal palette */
  .season-card {
    position: relative;
    border-radius: 1.75rem;
    overflow: hidden;
    box-shadow: 0 30px 60px -30px rgba(40, 20, 10, 0.35), 0 0 0 1px rgba(255, 220, 180, 0.06);
  }
  .season-card .season-content {
    position: relative;
    z-index: 10;
    padding: 1.75rem 1.5rem;
  }
  @media (min-width: 768px) {
    .season-card .season-content { padding: 2.5rem 2.75rem; }
  }
  .season-card .season-motif {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .season-card .season-tag {
    position: absolute;
    top: 1rem;
    right: 1.25rem;
    z-index: 20;
    font-family: ui-monospace, "Source Code Pro", SFMono-Regular, Menlo, monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  /* Season palettes */
  .season-opener {
    background:
      radial-gradient(ellipse at 30% 0%, oklch(0.96 0.06 85) 0%, transparent 60%),
      linear-gradient(160deg, oklch(0.94 0.04 80) 0%, oklch(0.90 0.05 65) 100%);
    color: oklch(0.22 0.05 32);
  }
  .season-late-winter {
    background:
      radial-gradient(circle at 80% 80%, oklch(0.55 0.16 55 / 0.55) 0%, transparent 45%),
      linear-gradient(170deg, oklch(0.30 0.025 250) 0%, oklch(0.22 0.04 30) 100%);
    color: oklch(0.94 0.05 75);
  }
  .season-spring {
    background:
      radial-gradient(circle at 20% 90%, oklch(0.88 0.10 30 / 0.6) 0%, transparent 50%),
      linear-gradient(140deg, oklch(0.93 0.07 130) 0%, oklch(0.88 0.09 55) 100%);
    color: oklch(0.22 0.06 35);
  }
  .season-harvest {
    background:
      radial-gradient(circle at 70% 20%, oklch(0.75 0.14 70 / 0.45) 0%, transparent 55%),
      linear-gradient(155deg, oklch(0.55 0.13 50) 0%, oklch(0.42 0.13 35) 100%);
    color: oklch(0.97 0.06 80);
  }
  .season-high-summer {
    background:
      radial-gradient(circle at 50% 0%, oklch(0.97 0.08 90) 0%, transparent 55%),
      linear-gradient(180deg, oklch(0.92 0.08 85) 0%, oklch(0.83 0.11 65) 100%);
    color: oklch(0.22 0.07 40);
  }
  .season-autumn {
    background:
      radial-gradient(circle at 80% 30%, oklch(0.65 0.15 55 / 0.5) 0%, transparent 55%),
      linear-gradient(160deg, oklch(0.42 0.12 40) 0%, oklch(0.30 0.10 28) 100%);
    color: oklch(0.96 0.06 78);
  }
  .season-hard-winter {
    background:
      radial-gradient(circle at 25% 75%, oklch(0.55 0.20 25 / 0.35) 0%, transparent 50%),
      linear-gradient(150deg, oklch(0.18 0.025 28) 0%, oklch(0.13 0.04 22) 100%);
    color: oklch(0.92 0.05 70);
  }
  .season-dusk {
    background:
      radial-gradient(circle at 50% 100%, oklch(0.55 0.18 30 / 0.55) 0%, transparent 60%),
      linear-gradient(180deg, oklch(0.28 0.08 35) 0%, oklch(0.16 0.05 25) 100%);
    color: oklch(0.97 0.07 75);
  }
  .season-early-spring {
    background:
      radial-gradient(circle at 75% 10%, oklch(0.92 0.07 55) 0%, transparent 55%),
      linear-gradient(135deg, oklch(0.93 0.06 25) 0%, oklch(0.91 0.08 80) 100%);
    color: oklch(0.22 0.05 32);
  }
  .season-candle-night {
    background:
      radial-gradient(circle at 50% 80%, oklch(0.62 0.16 75 / 0.30) 0%, transparent 45%),
      linear-gradient(180deg, oklch(0.15 0.03 30) 0%, oklch(0.10 0.04 22) 100%);
    color: oklch(0.95 0.08 75);
  }

  /* Section heading — stays grotesque to match site identity */
  .season-heading {
    font-family: 'Bricolage Grotesque', ui-sans-serif, system-ui, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 0.95;
    margin-bottom: 1.25rem;
    border-bottom: 1px solid currentColor;
    padding-bottom: 0.5rem;
    opacity: 0.95;
    font-size: clamp(1.75rem, 3.5vw, 2.5rem);
  }

  /* Motifs */
  @keyframes drift-up {
    0%   { transform: translate3d(0, 110%, 0) rotate(0); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translate3d(60px, -20%, 0) rotate(540deg); opacity: 0; }
  }
  @keyframes drift-down {
    0%   { transform: translate3d(0, -10%, 0) rotate(0); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translate3d(120px, 110%, 0) rotate(540deg); opacity: 0; }
  }
  @keyframes drift-down-slow {
    0%   { transform: translate3d(0, -5%, 0); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.8; }
    100% { transform: translate3d(20px, 110%, 0); opacity: 0; }
  }
  @keyframes drift-side {
    0%   { transform: translate3d(-10%, 0, 0); opacity: 0; }
    15%  { opacity: 0.7; }
    85%  { opacity: 0.7; }
    100% { transform: translate3d(110%, 12px, 0); opacity: 0; }
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    20%      { opacity: 0.85; transform: scale(1.04); }
    40%      { opacity: 0.65; transform: scale(0.98); }
    65%      { opacity: 0.95; transform: scale(1.06); }
    85%      { opacity: 0.70; transform: scale(1.02); }
  }
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.25; transform: scale(0.95); }
    50%      { opacity: 0.55; transform: scale(1.08); }
  }
  @keyframes shimmer-fade {
    0%, 100% { opacity: 0.20; }
    50%      { opacity: 0.55; }
  }
  @keyframes spin-vinyl {
    to { transform: rotate(360deg); }
  }

  /* Petal — spring */
  .motif-petal {
    position: absolute;
    bottom: -8%;
    width: 8px; height: 11px;
    background: linear-gradient(135deg, oklch(0.85 0.11 25), oklch(0.72 0.14 18));
    border-radius: 70% 0 70% 0;
    animation: drift-up 16s linear infinite;
    will-change: transform, opacity;
  }
  /* Dust mote — opener / summer */
  .motif-dust {
    position: absolute;
    width: 3px; height: 3px;
    background: oklch(0.95 0.08 80);
    border-radius: 50%;
    box-shadow: 0 0 6px oklch(0.95 0.08 80 / 0.6);
    animation: drift-up 22s linear infinite;
  }
  /* Steam wisp — harvest/cooking */
  .motif-steam {
    position: absolute;
    bottom: -10%;
    width: 18px; height: 30px;
    background: radial-gradient(ellipse, oklch(0.97 0.02 80 / 0.45) 0%, transparent 65%);
    filter: blur(6px);
    animation: drift-up 9s ease-in infinite;
  }
  /* Sun shaft — high summer */
  .motif-sunshaft {
    position: absolute;
    top: -10%;
    width: 4px; height: 130%;
    background: linear-gradient(180deg, oklch(0.97 0.10 85 / 0.45), transparent 80%);
    filter: blur(2px);
    animation: shimmer-fade 7s ease-in-out infinite;
  }
  /* Leaf — autumn */
  .motif-leaf {
    position: absolute;
    top: -8%;
    width: 14px; height: 14px;
    background: linear-gradient(135deg, oklch(0.65 0.18 50), oklch(0.45 0.16 40));
    border-radius: 0 100% 0 100%;
    transform-origin: center;
    animation: drift-down 14s linear infinite;
  }
  /* Snow — late winter */
  .motif-snow {
    position: absolute;
    top: -5%;
    width: 4px; height: 4px;
    background: oklch(0.97 0.02 250);
    border-radius: 50%;
    opacity: 0.85;
    animation: drift-down-slow 18s linear infinite;
  }
  /* Ember — hard winter (war) */
  .motif-ember {
    position: absolute;
    bottom: -5%;
    width: 5px; height: 5px;
    background: oklch(0.78 0.20 35);
    border-radius: 50%;
    box-shadow: 0 0 12px oklch(0.78 0.22 35 / 0.85), 0 0 24px oklch(0.65 0.22 30 / 0.5);
    animation: drift-up 11s ease-out infinite;
  }
  /* Window-lamp — late winter (single warm glow in the corner) */
  .motif-windowlamp {
    position: absolute;
    bottom: 18%;
    right: 8%;
    width: 90px; height: 90px;
    background: radial-gradient(circle, oklch(0.78 0.18 60 / 0.55) 0%, transparent 70%);
    animation: flicker 5s ease-in-out infinite;
  }
  /* Golden shimmer — dusk */
  .motif-glow {
    position: absolute;
    width: 220px; height: 220px;
    background: radial-gradient(circle, oklch(0.78 0.18 70 / 0.35) 0%, transparent 70%);
    animation: pulse-glow 6s ease-in-out infinite;
  }
  /* Vinyl — dusk */
  .motif-vinyl {
    position: absolute;
    right: -80px; top: -80px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background:
      radial-gradient(circle, oklch(0.55 0.18 30) 0% 18%, transparent 19%),
      repeating-radial-gradient(circle, oklch(0.10 0.02 25) 0 2px, oklch(0.16 0.02 25) 2px 4px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    opacity: 0.18;
    animation: spin-vinyl 30s linear infinite;
  }
  /* First-light shimmer — early spring */
  .motif-firstlight {
    position: absolute;
    width: 180px; height: 180px;
    background: radial-gradient(circle, oklch(0.95 0.07 60 / 0.45) 0%, transparent 65%);
    animation: shimmer-fade 5s ease-in-out infinite;
  }
  /* Candle — late winter night */
  .motif-candle-glow {
    position: absolute;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    width: 220px; height: 220px;
    background: radial-gradient(circle, oklch(0.85 0.16 75 / 0.50) 0%, transparent 65%);
    animation: flicker 3.2s ease-in-out infinite;
  }

  /* Photo treatments */
  .polaroid {
    background: oklch(0.97 0.02 80);
    padding: 0.85rem 0.85rem 2.5rem;
    box-shadow: 0 18px 40px -10px rgba(40, 20, 10, 0.45), 0 4px 10px rgba(40, 20, 10, 0.25);
    border-radius: 4px;
    transition: transform 350ms cubic-bezier(.2,.8,.2,1), box-shadow 350ms;
    position: relative;
  }
  .polaroid:hover {
    transform: translateY(-6px) rotate(0deg) !important;
    box-shadow: 0 30px 60px -10px rgba(40, 20, 10, 0.6);
    z-index: 5;
  }
  .polaroid img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 2px;
    display: block;
    background: oklch(0.92 0.02 80);
  }
  .polaroid-caption {
    position: absolute;
    bottom: 0.5rem;
    left: 0.85rem;
    right: 0.85rem;
    text-align: center;
    font-family: 'Caveat', 'Bradley Hand', cursive;
    font-size: 1.05rem;
    color: oklch(0.30 0.05 30);
    line-height: 1.2;
  }

  /* Phone-frame for the playlist screenshot */
  .phone-frame {
    position: relative;
    margin: 0 auto;
    max-width: 280px;
    padding: 12px 10px;
    background: oklch(0.10 0.02 30);
    border-radius: 36px;
    box-shadow:
      0 30px 60px -10px rgba(0,0,0,0.6),
      0 0 0 1px oklch(0.30 0.04 35),
      inset 0 0 0 2px oklch(0.20 0.03 30);
  }
  .phone-frame::before {
    content: '';
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 6px;
    background: oklch(0.05 0 0);
    border-radius: 3px;
    z-index: 2;
  }
  .phone-frame img {
    width: 100%;
    border-radius: 24px;
    display: block;
  }

  /* Pull quote */
  .pull-quote {
    border-left: 3px solid currentColor;
    padding-left: 1.25rem;
    margin: 1.5rem 0;
    font-style: italic;
    opacity: 0.92;
    font-size: 1.1rem;
    line-height: 1.55;
  }

es — about a 26-year-old's life in south Bengaluru, in a year that, by any honest reading of the news, has been louder than most."}),c.jsx("p",{className:"mt-5 text-base md:text-lg leading-relaxed opacity-90",children:"About leaving a 1BHK that I could afford but couldn't fill. About cooking, which sounds like a small thing until you live without it. About work I'm grateful for, an MBA I'm preparing for, friends I keep up with imperfectly, and the records I keep returning to when the rest of it gets heavy."}),c.jsx("p",{className:"mt-5 text-base md:text-lg leading-relaxed opacity-90",children:"If you came for code, the next track will have it. This one is just a person, in a room, with a stove and a playlist."})]}),c.jsxs(En,{season:"late-winter",title:"The 1BHK Math",motif:c.jsxs(c.Fragment,{children:[c.jsx(s1,{}),c.jsx("span",{className:"motif-windowlamp"})]}),children:[c.jsx("p",{children:"I tried doing it the proper way first."}),c.jsx("p",{children:"When I moved to Bengaluru three years ago, I rented a 1BHK on my own. It was the version of independent living I'd seen on screens — a small, solo space, a kitchen, a door I could close. What I hadn't seen on the screens was the math. Rent. Then cooking gas. Then electricity that surprised me every month. Then commute, because the place was nowhere near work — and Bengaluru's traffic does not negotiate."}),c.jsxs("p",{children:["Ubers every day were not a financial plan. So I switched to the bus. Anyone who's done a peak-hour bus in this city in summer knows the temperature of it. You don't ",c.jsx("em",{children:"ride"})," a Bengaluru bus; you marinate in it. By the time I got home, I had nothing left to cook with."]}),c.jsx("p",{className:"pull-quote",children:"What I felt most, though, wasn't the cost or the commute. It was the silence. I'd walk into my own apartment and it wasn't a relief. It was the thing pressing on me."}),c.jsx("p",{children:"My colleagues at the time — most of them now my closest friends — w jectPosition:"center 30%"}}),c.jsx("figcaption",{className:"text-sm mt-3 text-center opacity-75 italic",children:"An evening worth standing for."})]}),c.jsxs("p",{children:["I always knew how to cook in the basic sense. In the 1BHK I cooked, but it was ",c.jsx("em",{children:"survival cooking"})," — a tired meal at 9 pm I didn't enjoy making and didn't enjoy eating. Cooking like that is just another chore between you and bed."]}),c.jsx("p",{children:"In the PG, two things changed at once. I had energy left at the end of the day, and I had time. So I started watching videos. I started buying ingredients on purpose, instead of by panic. And then a thing happened I think most people don't expect — cooking became the part of the day I look forward to."}),c.jsxs("p",{children:["Mostly Italian. I lean European and American at home because the smells are easier to live with in a shared space — you don't want a chili tadka announcing itself to twenty other rooms. ",c.jsx("strong",{children:"Spaghetti aglio e olio"})," is my go-to: garlic, olive oil, chili flakes, pasta water, done in fifteen minutes, and it tastes like someone tried. A creamy mushroom pasta with a white wine sauce when I want to feel a little fancier. Garlic bread, salad, evening done."]}),c.jsxs(de.div,{className:"grid grid-cols-1 sm:grid-cols-3 gap-6 my-8",initial:{opacity:0},whileInView:{opacity:1},viewport:{once:!0},transition:{duration:.8,delay:.1},children:[c.jsxs("figure",{className:"polaroid",style:{transform:"rotate(-3deg)"},children:[c.jsx("img",{src:hs.friedRice,alt:"Fried rice with sunny-side-up egg",loading:"lazy"}),c.jsx("figcaption",{className:"polaroid-caption",children:"fried rice. sunny side up."})]}),c.jsxs("figure",{className:"polaroid",style:{transform:"rotate(2deg)",marginTop:"12px"},children:[c.jsx("img",{src:hs.tofu,alt:"Sautéed tofu with cheddar in a pan",loading:"lazy"}),c.jsx("figcaption",{className:"polaroid-caption",children:"sautéed tofu, cheddar."})]}),c.jsxs("figure",{className:"polaroid",style:{transform:"rotate(-1.5deg)"},children:[c.jsx("img",{src:hs.tomKha,alt:"Tom kha and noodles",loading:"lazy"}),c.jsxs("figcaption",{className:"polaroid-caption",children:["tom kha, noodles.",c.jsx("br",{}),"a long-week dinner."]})]})]}),c.jsx("p",{children:"I cook Asian when I can — stir-fried noodles, fried rice, tofu (love tofu), tom kha, a few Thai curries, and Indomie's Mi Goreng on the weeks that have been long. Eggs run out faster than anything in my fridge; I once made a special trip to the store for a single carton and learned, mid-aisle, that double-yolk eggs are now a thing you can buy in Bengaluru. Small joy."}),c.jsx("p",{children:"People say cooking is meditative. That's true, but it undersells it. Cooking is the place where I get to choose. Choose what's in my body, choose how the evening sounds, choose whether there's wine in the pan. I depend on no one for it."}),c.jsx("p",{className:"pull-quote",children:"After a job, GMAT prep, gym, and the world being on fire on the TV, having one thing in the day where I am uncontested in charge — that is the freedom part. It's small, and it's real."})]}),c.jsxs(En,{season:"high-summer",title:"A Day, Honestly",motif:c.jsxs(c.Fragment,{children:[c.jsx(dV,{}),c.jsx(a1,{count:20})]}),children:[c.jsx("p",{children:"6:30 am. Up. A jog while the city is still negotiating its mood. Shower, GMAT, coffee — the coffee being non-negotiable. Work begins at 10:30; my schedule is flexible enough that I can be in the office or at home depending on what the day needs."}),c.jsxs("p",{children:["I'm an ",c.jsx("strong",{children:"AI Innovation Applications Engineer at Airbus"}),", and I get to lead a few aviation projects on the business side too. I write that sentence and still have to remind myself that it's mine. I work on cutting-edge AI in a company that genuinely ",c.jsx("em",{children:"makes things"})," — heavy, beautiful, complicated things that move people across the world. I get free reign to follow my interests, and to call that work. I am very, very aware of how lucky that is. Touch wood."]}),c.jsxs(de.figure,{className:"my-6",initial:{opacity:0,scale:.97},whileInView:{opacity:1,scale:1},viewport:{once:!0},transition:{duration:.8},children:[c.jsx("img",{src:hs.room,alt:"The room where this was written",className:"w-full rounded-2xl shadow-2xl object-cover",style:{maxHeight:"460px"}}),c.jsx("figcaption",{className:"text-sm mt-3 text-center opacity-75 italic",children:"The room. The window. The slow-built version of an adult life."})]}),c.jsx("p",{children:"Lunch around 1, light, from the office options. Back to it through the afternoon. Then evening GMAT classes. Then home — and home is when the day actually opens. I cook. I eat. I clean up after myself, because nobody else will and an untidy room costs me sleep. Maybe a movie. Maybe a call with someone I miss. Bed by 11 if I'm being honest, by 12:30 if I'm not."}),c.jsx("p",{children:"When life gets heavy, sleep is the first thing to slip. It always is. I tell myself it's temporary; I try to keep the rest of it intact — gym, food, friends — because I've learned that the day a few of those go down at once is the day I stop functioning. Sleep I can claw back on a Sunday. The rest, less so."}),c.jsxs("p",{children:["The GMAT is in the next few months. The plan, unconventionally for a lot of people in my circle, is Asia — ",c.jsx("strong",{children:"Singapore, Hong Kong"}),". The US and Europe are the obvious moves. I am not interested in the obvious move. I want to be in business schools pointed at the markets I think will define the next decade, and I want the friction of a different kind of room than the one most of my peers will be in."]})]}),c.jsxs(En,{season:"autumn",title:"Friends, Imperfectly",motif:c.jsx(fV,{}),children:[c.jsx("p",{children:"My friends are scattered. Some are from back home in Hyderabad, who I see when I'm there and call when I miss them. Some are colleagues, who became close because we built things together and learned each other's worst weeks. Some are PG mates, who I drift in and out of because we live next to each other and it's easy."}),c.jsx("p",{children:"I am not a great friend in the busy weeks. I'm honest about that. The GMAT and the job and the cooking and the keeping a room together — they take from somewhere, and friendships are quiet enough to not complain when I take from them. The thing I've gotten better at is saying that out loud, and showing up properly when I can."})]}),c.jsxs(En,{season:"hard-winter",title:"The World, Loud",motif:c.jsxs(c.Fragment,{children:[c.jsx(s1,{count:18}),c.jsx(hV,{})]}),children:[c.jsx("p",{children:"I usually try to keep the news at arm's length. This year, that hasn't worked."}),c.jsx("p",{children:"In late February the US and Israel hit Iran. Khamenei was killed. Five weeks of war, then a ceasefire that has been more pause than peace. As I write this, the Lebanon truce just got extended for another three weeks, talks with Iran are stalled, the Strait of Hormuz is under blockade, and Israel's defence minister has said publicly they are ready to resume fighting if Washington gives the word. Thousands dead, millions displaced."}),c.jsx("p",{className:"pull-quote",children:"Those are the official numbers. You read that, and you stand in your kitchen in Bengaluru, and you make pasta, and you do not know what to do with the gap."})]}),c.jsxs(En,{season:"dusk",title:"Old Songs for New Wars",motif:c.jsx(mV,{}),children:[c.jsx("p",{children:"What I do, mostly, is play old music."}),c.jsx("p",{children:"I keep coming back to the '60s through the '90s — Led Zeppelin, Elton John, Pink Floyd, the Stones, AC/DC, Metallica, Nirvana, Guns N' Roses, the Chili Peppers, all the obvious ones. Grunge in particular got me through adolescence into adulthood, and Nirvana especially is a band I owe something to that I won't be able to repay."}),c.jsxs("p",{children:["But my heavy daily rotation is softer than that — Chicago, REO Speedwagon, the Eagles, the Beatles, Fleetwood Mac. Some country mood weeks I'm deep in Lynyrd Skynyrd; ",c.jsx("em",{children:"The Ballad of Curtis Loew"})," has been on repeat lately. I feel bad for Curtis. Dire Straits, the Police, Steppenwolf, the Doors — they all rotate."]}),c.jsxs(de.div,{className:"my-8",initial:{opacity:0,y:30},whileInView:{opacity:1,y:0},viewport:{once:!0},transition:{duration:.8},children:[c.jsx("div",{className:"phone-frame",children:c.jsx("img",{src:hs.playlist,alt:"My 2026 favourite-tracks playlist",loading:"lazy"})}),c.jsx("p",{className:"text-sm mt-4 text-center opacity-75 italic",children:"All of it, in one place. Side A through B-side."})]}),c.jsxs("p",{children:["The one song. ",c.jsx("em",{children:"Landslide"})," by Fleetwood Mac. That's the lyric on repeat right now. I don't have a better explanation for it than that some songs find you at the right age. Stevie Nicks wrote it at twenty-seven, I'm twenty-six, and the line about being afraid of changing because you've built your life around someone — only it isn't a someone for me, it's a city, a stove, a job, a slow-built version of an adult life — that line is louder than anything else this season."]}),c.jsxs("p",{children:["The wartime parallel is that history doesn't actually do anything new. The Cold War sat over my parents' parents under threat of mushroom clouds, and the same decades gave us ",c.jsx("em",{children:"War Pigs"})," and ",c.jsx("em",{children:"Sympathy for the Devil"})," — songs that didn't pretend the world was fine. ",c.jsx("em",{children:"Civil War"})," by Guns N' Roses came later but kept the same line of thought. Those songs were written by people standing exactly where I'm standing now: in a kitchen, with a job, with the news on, knowing the people deciding things are not them and may not have their interests in mind."]}),c.jsxs("p",{className:"pull-quote",children:["Why the music helps isn't that it cheers anything up. It's the opposite — the music ",c.jsx("em",{children:"acknowledges"})," it. The acknowledgement is the thing. I don't need a song to lie to me; I need a song to say ",c.jsx("em",{children:"yes, this is what it feels like, you're not crazy, others have been here, and they kept going."})]}),c.jsx("p",{children:"And they kept going. That's the part that matters."})]}),c.jsxs(En,{season:"early-spring",title:"Better, Defined Small",motif:c.jsx(pV,{}),children:[c.jsx("p",{children:"I'm 26. I don't have most things figured out. What I do have is enough years behind me to have seen — clearly enough to bet on it — that consistency works. In anything."}),c.jsx("p",{children:"So when I say I want to be better every day, I don't mean a self-help thing. I mean exactly what the words say. Better than yesterday. Slightly more patient with the people I care about. Slightly more present in the meal I'm making instead of half-thinking about the next thing. Slightly braver, because the one thing I think my generation is short on is bravery — and a related thing, selflessness. We are all very focused on our own lives. Not all of that is wrong, but some of it is, and I want to spend the next decade being a person who notices when someone else needs something and just does it."}),c.jsx("p",{children:"Concretely, this week: cook one new recipe. Sleep before midnight on three of five weekdays. Call one friend I've been meaning to. Get through one extra GMAT problem set. Don't doomscroll past 10 pm. Show up for the people in my building when they need me to."}),c.jsx("p",{className:"pull-quote",children:"Life moves on whether or not we're ready. The world will be loud whether or not we asked for that. The only piece of all this we have any actual control over is what we do, today, in the room we're in."}),c.jsx("p",{children:"Mine has a stove, and a playlist, and a window. That's enough to start."})]}),c.jsxs(En,{season:"candle-night",title:"B-Side: The Playlist",motif:c.jsx(gV,{}),children:[c.jsx("p",{className:"opacity-
