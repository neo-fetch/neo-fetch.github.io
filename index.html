ked with Atlassian tools, Bitbucket, and JIRA. Built a full-stack application with React.js, Node.js, and MongoDB."}],zM=[{image:"https://github.com/neo-fetch/mcbk/blob/master/ResearchPaper.png?raw=true",links:["https://doi.org/10.48550/arXiv.2301.02790","https://arxiv.org/abs/2301.02790","https://scholar.google.co.in/scholar?cites=21012604147193933&as_sdt=2005&sciodt=0,5&hl=en"],title:"My Research Paper",description:"Investigations on convergence behaviour of Physics Informed Neural Networks across spectral ranges and derivative orders. This paper discusses the spectral bias in PINNs and how it varies across different orders of differential equations."},{image:"https://www.mdpi.com/energies/energies-16-04558/article_deploy/html/images/energies-16-04558-g012-550.jpg",links:["https://github.com/neo-fetch/nvidia-modulus-airfoil-optimisation"],title:"Airfoil Optimisation using PINNs",description:"This repository uses the Modulus deep learning framework to have a go at solving aerodynamics in a flat plate scenario for various speeds, from laminar flow to supersonic pockets. We implement Physics Informed Neural Networks (PINNs) within Modulus and provide them here."},{image:"https://camo.githubusercontent.com/94550c4a689b804938dfce4a4fb568feb950ac8bebf374a545ce82f7d025a55b/68747470733a2f2f692e696d6775722e636f6d2f6a705a45504b352e706e67",links:["https://github.com/neo-fetch/shinrai-dotfiles"],title:"Ricing my Arch Linux",description:"This project involves customizing my Arch Linux setup with various tools and applications. The setup includes Alacritty, Neofetch, Dunst, Rofi, Qtile WM (or BSPWM), Hyperland compositor, ZSH, Fish, Kitty, Polybar, Picom, Nvim, and more."}],DM={links:["https://neo-fetch.github.io/blogs/"]},OM=[{id:"post-1",title:"Understanding How Neural Networks Learn: A Peek into Physics and Frequencies",summary:"Explore the fascinating world of neural networks and their learning mechanisms. This article delves into the physics behind neural networks, spectra
