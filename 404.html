<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Mayank Deshpande</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    // Single Page Apps for GitHub Pages — rafgraph/spa-github-pages (MIT)
    // Redirects deep links into index.html with a special query that
    // index.html's inline script decodes back into the real path.
    //
    // pathSegmentsToKeep = 0  →  user pages (neo-fetch.github.io)        ← current
    // pathSegmentsToKeep = 1  →  project pages (neo-fetch.github.io/repo)
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>

<body></body>

</html>
